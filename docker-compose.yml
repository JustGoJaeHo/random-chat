services:
  nginx:
    image: nginx:1.28.2-alpine
    container_name: nginx
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - appnet

  php:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: php
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    environment:
      TZ: Asia/Seoul
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - appnet

  workerman:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: workerman
    working_dir: /var/www/backend
    command: ["php", "/var/www/worker/ws-server.php", "start"]
    # command: ["sh", "-c", "while true; do sleep 3600; done"]
    volumes:
      - ./backend:/var/www/backend
      - ./worker:/var/www/worker
    environment:
      TZ: Asia/Seoul
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      redis:
        condition: service_healthy
      php:
        condition: service_started
    ports:
      - "${WORKERMAN_PORT}:8081"
    networks:
      - appnet

  mysql:
    image: mysql:8.4
    container_name: mysql
    environment:
      TZ: Asia/Seoul
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - appnet

  redis:
    image: redis:8.4-alpine
    container_name: redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - appnet

volumes:
  mysql_data:
  redis_data:

networks:
  appnet:
    driver: bridge
